services:
  # Web Dashboard
  - type: web
    name: xmore-ksa
    env: node
    rootDir: web-ui
    buildCommand: npm install
    startCommand: node init-db.js && node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trading-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        value: https://xmore-ksa.onrender.com

  # Note: Python computation (agents, scoring, backtest, evaluation) runs via
  # GitHub Actions (.github/workflows/scheduled-tasks.yml) — not on Render dyno.
  # Render env: node has no Python runtime on the free tier.

databases:
  - name: trading-db
    databaseName: trading_system
    user: trading_user
