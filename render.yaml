services:
  # Web Dashboard
  - type: web
    name: trading-dashboard
    env: node
    rootDir: web-ui
    buildCommand: npm install && pip3 install -r requirements-web.txt --quiet
    startCommand: node init-db.js && node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trading-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true

  # Derivatives Pricing API (Python/FastAPI worker)
  - type: web
    name: xmore-derivatives-api
    env: python
    buildCommand: pip install -r derivatives_api/requirements.txt -r requirements.txt
    startCommand: uvicorn derivatives_api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # Note: Scheduled tasks run via GitHub Actions (.github/workflows/scheduled-tasks.yml)

databases:
  - name: trading-db
    databaseName: trading_system
    user: trading_user
