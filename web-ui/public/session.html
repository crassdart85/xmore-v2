<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="base.css">
  <title>Xmore — Session Sheet</title>
  <link rel="stylesheet" href="session.css">
</head>
<body>

  <!-- Header -->
  <header class="s-header x-topbar x-topbar--dark">
    <a href="/" class="s-back x-back" id="sBack">← Dashboard</a>
    <span class="s-logo x-brand">XMORE <span class="s-logo-tag">SESSION</span></span>
    <span class="s-session-label" id="sSessionLabel">
      Session <span class="s-session-date" id="sSessionDate">—</span>
    </span>
    <nav class="x-nav-links" aria-label="Primary">
      <a class="x-link" href="/">Home</a>
      <a class="x-link" href="/track-record">Track Record</a>
      <a class="x-link" href="/pro">Pro</a>
      <a class="x-link active" href="/session" aria-current="page">Session</a>
      <a class="x-link" href="/docs">Docs</a>
    </nav>
    <div class="s-auth-area">
      <span class="s-auth-user" id="sAuthUser" style="display:none"></span>
      <button class="s-auth-btn" id="sLogoutBtn" style="display:none" onclick="sHandleLogout()">Sign Out</button>
      <button class="s-auth-btn s-auth-btn--primary" id="sLoginBtn" onclick="sShowModal()">Sign In</button>
    </div>
    <button class="s-lang-btn" id="sLangBtn" onclick="toggleLang()">عر</button>
  </header>

  <!-- Auth Modal -->
  <div class="s-modal-overlay" id="sAuthModal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="sModalTitle" onclick="if(event.target===this)sHideModal()">
    <div class="s-modal">
      <button class="s-modal-close" onclick="sHideModal()" aria-label="Close dialog">&times;</button>
      <div class="s-modal-title" id="sModalTitle">Sign in to Xmore</div>
      <form class="s-modal-form" id="sAuthForm" onsubmit="sHandleSubmit(event)">
        <label class="s-modal-label">Email</label>
        <input class="s-modal-input" type="email" id="sAuthEmail" required autocomplete="email" placeholder="you@example.com">
        <label class="s-modal-label">Password</label>
        <input class="s-modal-input" type="password" id="sAuthPassword" required minlength="8" autocomplete="current-password" placeholder="••••••••">
        <div class="s-modal-error" id="sAuthError" style="display:none"></div>
        <button class="s-modal-submit" id="sAuthSubmit" type="submit">Login</button>
      </form>
    </div>
  </div>

  <div class="s-container">

    <!-- Index levels (EGX30 / EGX70 pivot levels) -->
    <div class="s-section-title" id="sIdxTitle">
      <span>INDEX SUPPORT &amp; RESISTANCE</span>
    </div>
    <div class="s-index-wrap" id="sIndexWrap">
      <div class="s-loading" id="sIdxLoading">Loading index levels…</div>
    </div>

    <!-- Stock session sheet -->
    <div class="s-section-title" id="sStocksTitle">
      <span>STOCK SIGNALS</span>
    </div>

    <div class="s-table-wrap">
      <table class="s-table" id="sTable">
        <thead id="sTableHead"></thead>
        <tbody id="sTableBody">
          <tr><td colspan="12" class="s-loading">Loading session data…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Virtual Portfolio Simulator -->
    <div class="s-section-title" id="sSimTitle"><span>VIRTUAL PORTFOLIO SIMULATOR</span></div>
    <div class="s-sim-panel" id="sSimPanel">
      <div class="s-sim-form">
        <label for="simSymbol" class="sr-only">Select stock symbol</label>
        <select id="simSymbol" class="s-sim-input" aria-label="Select stock symbol"></select>
        <label for="simEntryPrice" class="sr-only">Entry price</label>
        <input type="number" id="simEntryPrice" class="s-sim-input" placeholder="Entry price" step="0.01" min="0.01" aria-label="Entry price">
        <button class="s-sim-btn s-sim-open" onclick="simOpenPosition()">+ Open Position</button>
      </div>
      <div id="simOpenList" class="s-sim-list"></div>
      <div id="simStats" class="s-sim-stats"></div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="s-footer">
    <span class="s-footer-logo">XMORE</span>
    <span class="s-footer-note" id="sFooterNote">
      AI-generated signals — not financial advice. EGX · Sun–Thu 10:00–14:30 Cairo.
    </span>
  </footer>

<script src="xmore-toast.js"></script>
<script>
/* ─── i18n ────────────────────────────────────────────────────────────────── */
const T = {
  en: {
    back:        '← Dashboard',
    sessionLabel:'Session',
    idxTitle:    'INDEX SUPPORT & RESISTANCE',
    stockTitle:  'STOCK SIGNALS',
    colQ:        '#',
    colCode:     'CODE',
    colName:     'Name',
    colTrend:    'Trend',
    colRecType:  'Type',
    colBuy:      'Buy Guide',
    colSL:       'Stop Loss',
    colTarget:   'Target',
    colProfit:   'Profit%',
    colRisk:     'Risk%',
    colRR:       'R/R',
    colS2:       'S2',
    colS1:       'S1',
    colPivot:    'Pivot',
    colR1:       'R1',
    colR2:       'R2',
    colPatterns: 'Patterns',
    simTitle:    'VIRTUAL PORTFOLIO SIMULATOR',
    simOpen:     '+ Open Position',
    simClose:    'Close',
    simNoOpen:   'No open positions.',
    simStats:    'Stats',
    loading:     'Loading session data…',
    idxLoading:  'Loading index levels…',
    empty:       'No session data available. Run the pipeline to generate signals.',
    noLogin:     'Sign in to view your personalised session sheet.',
    footer:      'AI-generated signals — not financial advice. EGX · Sun–Thu 10:00–14:30 Cairo.',
  },
  ar: {
    back:        'الرئيسية →',
    sessionLabel:'جلسة',
    idxTitle:    'مستويات الدعم والمقاومة للمؤشرات',
    stockTitle:  'إشارات الأسهم',
    colQ:        '#',
    colCode:     'الكود',
    colName:     'الاسم',
    colTrend:    'الاتجاه',
    colRecType:  'النوع',
    colBuy:      'سعر الدخول',
    colSL:       'وقف الخسارة',
    colTarget:   'الهدف',
    colProfit:   'ربح%',
    colRisk:     'خطر%',
    colRR:       'ع/خ',
    colS2:       'دعم 2',
    colS1:       'دعم 1',
    colPivot:    'المحور',
    colR1:       'مقاومة 1',
    colR2:       'مقاومة 2',
    colPatterns: 'الأنماط',
    simTitle:    'محاكي المحفظة الافتراضية',
    simOpen:     '+ فتح صفقة',
    simClose:    'إغلاق',
    simNoOpen:   'لا توجد صفقات مفتوحة.',
    simStats:    'إحصاءات',
    loading:     'جاري تحميل البيانات…',
    idxLoading:  'جاري تحميل مستويات المؤشرات…',
    empty:       'لا توجد بيانات للجلسة. قم بتشغيل الخط لتوليد الإشارات.',
    noLogin:     'سجّل دخولك لعرض ورقة الجلسة الخاصة بك.',
    footer:      'إشارات مولّدة بالذكاء الاصطناعي — ليست نصيحة مالية. بورصة مصر · الأحد–الخميس 10:00–14:30 القاهرة.',
  }
};

let lang = localStorage.getItem('lang') || 'en';

function t(key) { return (T[lang] || T.en)[key] || key; }

function toggleLang() {
  lang = lang === 'en' ? 'ar' : 'en';
  localStorage.setItem('lang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('sLangBtn').textContent = lang === 'en' ? 'عر' : 'EN';
  applyLang();
  renderTable(window._sessionData || []);
  renderIndexCards(window._indexData || []);
}

function applyLang() {
  document.getElementById('sBack').textContent       = t('back');
  document.getElementById('sIdxTitle').innerHTML     = `<span>${t('idxTitle')}</span>`;
  document.getElementById('sStocksTitle').innerHTML  = `<span>${t('stockTitle')}</span>`;
  document.getElementById('sSimTitle').innerHTML     = `<span>${t('simTitle')}</span>`;
  document.getElementById('sFooterNote').textContent = t('footer');
  const lbl    = document.getElementById('sSessionLabel');
  const dateEl = document.getElementById('sSessionDate');
  const date   = dateEl ? dateEl.textContent : '—';
  // Preserve id="sSessionDate" so subsequent applyLang() calls can still find the span
  lbl.innerHTML = `${t('sessionLabel')} <span class="s-session-date" id="sSessionDate">${date}</span>`;
}

/* ─── Trend class ─────────────────────────────────────────────────────────── */
function trendClass(trendEn) {
  if (!trendEn) return 's-trend-side';
  const u = trendEn.toLowerCase();
  if (u === 'bullish')  return 's-trend-up';
  if (u === 'bearish')  return 's-trend-down';
  return 's-trend-side';
}

function trendLabel(row) {
  return lang === 'ar' ? (row.trend_ar || '—') : (row.trend_en || '—');
}

function recTypeLabel(row) {
  return lang === 'ar' ? (row.rec_type_ar || '—') : (row.rec_type_en || '—');
}

function nameLabel(row) {
  return lang === 'ar' ? (row.name_ar || row.symbol) : (row.name_en || row.symbol);
}

function fmt(v, decimals = 2) {
  if (v == null || v === '' || isNaN(v)) return '—';
  return Number(v).toFixed(decimals);
}

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  const n = Number(v);
  const cls = n >= 0 ? 's-pct-pos' : 's-pct-neg';
  return `<span class="${cls}">${n.toFixed(1)}%</span>`;
}

/* ─── Render table head ───────────────────────────────────────────────────── */
function renderHead() {
  const cols = [
    t('colQ'), t('colCode'), t('colName'),
    t('colTrend'), t('colRecType'),
    t('colBuy'), t('colSL'), t('colTarget'),
    t('colProfit'), t('colRisk'), t('colRR'),
    t('colS2'), t('colS1'), t('colPivot'), t('colR1'), t('colR2'),
    t('colPatterns'),
  ];
  const head = document.getElementById('sTableHead');
  head.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
}

/* ─── Render rows ─────────────────────────────────────────────────────────── */
function renderTable(data) {
  renderHead();
  const tbody = document.getElementById('sTableBody');
  const labels = {
    q: t('colQ'),
    code: t('colCode'),
    name: t('colName'),
    trend: t('colTrend'),
    rec: t('colRecType'),
    buy: t('colBuy'),
    sl: t('colSL'),
    tgt: t('colTarget'),
    profit: t('colProfit'),
    risk: t('colRisk'),
    rr: t('colRR'),
    s2: t('colS2'),
    s1: t('colS1'),
    pivot: t('colPivot'),
    r1: t('colR1'),
    r2: t('colR2'),
    patterns: t('colPatterns'),
  };

  if (!data || data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="17" class="s-empty">${t('empty')}</td></tr>`;
    return;
  }

  function renderPatterns(raw) {
    if (!raw) return '—';
    let list;
    try { list = typeof raw === 'string' ? JSON.parse(raw) : raw; } catch(_) { return '—'; }
    if (!list || list.length === 0) return '—';
    return list.map(p => {
      const cls = p.signal === 'bullish' ? 's-pat-bull' : p.signal === 'bearish' ? 's-pat-bear' : 's-pat-neu';
      const name = lang === 'ar' ? (p.name_ar || p.name_en) : p.name_en;
      return `<span class="s-pattern-badge ${cls}">${name}</span>`;
    }).join('');
  }

  const rows = data.map((row, i) => {
    const tc = trendClass(row.trend_en);
    const recCls = (row.rec_type_en || '').toLowerCase() === 'trade' ? 's-rec-trade' : 's-rec-hold';
    const sym = row.symbol.replace('.CA', '');

    return `<tr>
      <td data-label="${labels.q}" class="s-row-num">${i + 1}</td>
      <td data-label="${labels.code}" class="s-code">${sym}</td>
      <td data-label="${labels.name}" class="s-name">${nameLabel(row)}</td>
      <td data-label="${labels.trend}" class="${tc}">${trendLabel(row)}</td>
      <td data-label="${labels.rec}" class="${recCls}">${recTypeLabel(row)}</td>
      <td data-label="${labels.buy}" class="s-num-buy">${fmt(row.buy_guide, 3)}</td>
      <td data-label="${labels.sl}" class="s-num-sl">${fmt(row.stop_loss_price, 3)}</td>
      <td data-label="${labels.tgt}" class="s-num-tgt">${fmt(row.target_price, 3)}</td>
      <td data-label="${labels.profit}">${fmtPct(row.target_pct)}</td>
      <td data-label="${labels.risk}">${fmtPct(row.stop_loss_pct)}</td>
      <td data-label="${labels.rr}" class="s-num">${fmt(row.risk_reward_ratio, 2)}</td>
      <td data-label="${labels.s2}" class="s-pivot-val">${fmt(row.s2, 3)}</td>
      <td data-label="${labels.s1}" class="s-pivot-val">${fmt(row.s1, 3)}</td>
      <td data-label="${labels.pivot}" class="s-pivot-val">${fmt(row.pivot, 3)}</td>
      <td data-label="${labels.r1}" class="s-pivot-val">${fmt(row.r1, 3)}</td>
      <td data-label="${labels.r2}" class="s-pivot-val">${fmt(row.r2, 3)}</td>
      <td data-label="${labels.patterns}" class="s-patterns">${renderPatterns(row.patterns)}</td>
    </tr>`;
  }).join('');

  tbody.innerHTML = rows;
}

/* ─── Index cards ─────────────────────────────────────────────────────────── */
function renderIndexCards(data) {
  const wrap = document.getElementById('sIndexWrap');
  if (!data || data.length === 0) {
    wrap.innerHTML = `<div class="s-empty">${t('empty')}</div>`;
    return;
  }

  const labels = {
    s2:    t('colS2'),
    s1:    t('colS1'),
    pivot: t('colPivot'),
    r1:    t('colR1'),
    r2:    t('colR2'),
    sl:    t('colSL'),
  };

  wrap.innerHTML = data.map(row => {
    const sym = row.symbol.replace('.CA', '');
    const name = lang === 'ar' ? (row.name_ar || sym) : (row.name_en || sym);
    const cells = [
      { label: labels.s2,    val: fmt(row.s2,             3), cls: 's-num-sl'  },
      { label: labels.s1,    val: fmt(row.s1,             3), cls: 's-num-sl'  },
      { label: labels.pivot, val: fmt(row.pivot,          3), cls: 's-pivot-val'},
      { label: labels.r1,    val: fmt(row.r1,             3), cls: 's-num-tgt' },
      { label: labels.r2,    val: fmt(row.r2,             3), cls: 's-num-tgt' },
      { label: labels.sl,    val: fmt(row.stop_loss_price,3), cls: 's-num-sl'  },
    ].map(c => `
      <div class="s-index-cell">
        <div class="s-index-cell-label">${c.label}</div>
        <div class="s-index-cell-val ${c.cls}">${c.val}</div>
      </div>`).join('');

    return `<div class="s-index-card">
      <div class="s-index-head">
        <span class="s-index-code">${sym}</span>
        <span class="s-index-name">${name}</span>
      </div>
      <div class="s-index-body">${cells}</div>
    </div>`;
  }).join('');
}

/* ─── Load data ───────────────────────────────────────────────────────────── */
async function loadSession() {
  try {
    const res = await fetch('/api/trades/session-sheet', { credentials: 'include' });
    if (!res.ok) {
      if (res.status === 401) {
        const msg = `<span>${t('noLogin')}</span> <button class="s-auth-btn s-auth-btn--primary" style="margin-left:12px" onclick="sShowModal()">Sign In</button>`;
        document.getElementById('sTableBody').innerHTML =
          `<tr><td colspan="17" class="s-empty" style="padding:24px">${msg}</td></tr>`;
        document.getElementById('sIndexWrap').innerHTML =
          `<div class="s-empty" style="padding:24px">${msg}</div>`;
        return;
      }
      throw new Error(`HTTP ${res.status}`);
    }
    const json = await res.json();

    // Set session date
    const dateEl = document.getElementById('sSessionDate');
    dateEl.textContent = json.session_date || '—';
    applyLang();

    window._sessionData = json.stocks || [];
    window._indexData   = json.indices || [];

    renderTable(window._sessionData);
    renderIndexCards(window._indexData);
    populateSimSymbols(window._sessionData);
  } catch (e) {
    document.getElementById('sTableBody').innerHTML =
      `<tr><td colspan="17" class="s-empty">Error loading data: ${e.message}</td></tr>`;
    document.getElementById('sIndexWrap').innerHTML = '';
  }
}

/* ─── Virtual Portfolio Simulator ─────────────────────────────────────────── */
async function simOpenPosition() {
  const symbol = document.getElementById('simSymbol').value;
  const price  = parseFloat(document.getElementById('simEntryPrice').value);
  if (!symbol) { xToast(lang === 'ar' ? 'اختر رمز السهم' : 'Please select a symbol.', 'error'); return; }
  if (!price || price <= 0) { xToast(lang === 'ar' ? 'أدخل سعر دخول صحيح' : 'Enter a valid entry price.', 'error'); return; }
  try {
    const res = await fetch('/api/trades/positions', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol, entry_price: price }),
    });
    const data = await res.json();
    if (!res.ok) { xToast(data.error || 'Error opening position', 'error'); return; }
    document.getElementById('simEntryPrice').value = '';
    xToast(lang === 'ar' ? 'تم فتح الصفقة' : 'Position opened.', 'success');
    loadSimulator();
  } catch (e) { xToast('Error: ' + e.message, 'error'); }
}

async function simClosePosition(id, currentPrice) {
  const val = await xPrompt(
    lang === 'ar' ? 'سعر الإغلاق:' : 'Exit price:',
    currentPrice || '',
    lang === 'ar' ? 'إغلاق الصفقة' : 'Close Position'
  );
  if (!val) return;
  const exitPrice = parseFloat(val);
  if (!exitPrice || exitPrice <= 0) { xToast(lang === 'ar' ? 'سعر غير صحيح' : 'Invalid exit price.', 'error'); return; }
  try {
    const res = await fetch(`/api/trades/positions/${id}`, {
      method: 'PATCH', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ exit_price: exitPrice }),
    });
    const data = await res.json();
    if (!res.ok) { xToast(data.error || 'Error closing position', 'error'); return; }
    xToast(data.message || (lang === 'ar' ? 'تم إغلاق الصفقة' : 'Position closed.'), 'success');
    loadSimulator();
  } catch (e) { xToast('Error: ' + e.message, 'error'); }
}

async function loadSimulator() {
  try {
    const res = await fetch('/api/trades/portfolio', { credentials: 'include' });
    if (!res.ok) { document.getElementById('simOpenList').innerHTML = ''; return; }
    const data = await res.json();
    const list = document.getElementById('simOpenList');
    const statsEl = document.getElementById('simStats');
    const open = data.open_positions || [];

    if (open.length === 0) {
      list.innerHTML = `<div class="s-sim-empty">${t('simNoOpen')}</div>`;
    } else {
      list.innerHTML = open.map(p => {
        const ret = parseFloat(p.unrealized_return_pct || 0);
        const cls = ret >= 0 ? 's-pct-pos' : 's-pct-neg';
        const sym = p.symbol.replace('.CA', '');
        const name = lang === 'ar' ? (p.name_ar || sym) : (p.name_en || sym);
        return `<div class="s-sim-row">
          <span class="s-sim-sym">${sym}</span>
          <span class="s-sim-name">${name}</span>
          <span>Entry: <strong>${fmt(p.entry_price, 3)}</strong></span>
          <span>Now: <strong>${fmt(p.current_price, 3)}</strong></span>
          <span class="${cls}"><strong>${ret >= 0 ? '+' : ''}${ret}%</strong></span>
          <button class="s-sim-btn s-sim-close-btn" onclick="simClosePosition(${p.id}, ${p.current_price || p.entry_price})">${t('simClose')}</button>
        </div>`;
      }).join('');
    }

    const s = data.stats || {};
    if (s.total_trades > 0) {
      statsEl.innerHTML = `<span>${t('simStats')}: ${s.total_trades} closed · Win rate: ${s.win_rate}% · Avg return: ${s.avg_return > 0 ? '+' : ''}${s.avg_return}%</span>`;
    } else {
      statsEl.innerHTML = '';
    }
  } catch (_) {}
}

function populateSimSymbols(data) {
  const sel = document.getElementById('simSymbol');
  if (!sel || !data || data.length === 0) return;
  sel.innerHTML = data.map(r => `<option value="${r.symbol}">${r.symbol.replace('.CA', '')}</option>`).join('');
}

/* ─── Auth ────────────────────────────────────────────────────────────────── */
let _sModalPrevFocus = null;

function sShowModal() {
  _sModalPrevFocus = document.activeElement;
  const modal = document.getElementById('sAuthModal');
  modal.style.display = 'flex';
  document.getElementById('sAuthError').style.display = 'none';
  document.getElementById('sAuthEmail').value = '';
  document.getElementById('sAuthPassword').value = '';
  setTimeout(() => document.getElementById('sAuthEmail').focus(), 50);
}

function sHideModal() {
  document.getElementById('sAuthModal').style.display = 'none';
  if (_sModalPrevFocus && _sModalPrevFocus.focus) _sModalPrevFocus.focus();
  _sModalPrevFocus = null;
}

async function sHandleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('sAuthSubmit');
  const errEl = document.getElementById('sAuthError');
  btn.disabled = true;
  btn.textContent = '…';
  errEl.style.display = 'none';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email:    document.getElementById('sAuthEmail').value,
        password: document.getElementById('sAuthPassword').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    sHideModal();
    sUpdateAuthUI(data.user || { email: document.getElementById('sAuthEmail').value });
    loadSession();
    loadSimulator();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Login';
  }
}

async function sHandleLogout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
  sUpdateAuthUI(null);
  loadSession();
}

function sUpdateAuthUI(user) {
  const loginBtn  = document.getElementById('sLoginBtn');
  const logoutBtn = document.getElementById('sLogoutBtn');
  const userEl    = document.getElementById('sAuthUser');
  if (user) {
    loginBtn.style.display  = 'none';
    logoutBtn.style.display = '';
    userEl.style.display    = '';
    userEl.textContent = user.display_name || user.email || '';
  } else {
    loginBtn.style.display  = '';
    logoutBtn.style.display = 'none';
    userEl.style.display    = 'none';
  }
}

async function sCheckAuth() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (res.ok) {
      const data = await res.json();
      sUpdateAuthUI(data.user || data);
    }
  } catch (_) {}
}

/* ─── Init ────────────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  document.documentElement.lang = lang;
  document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('sLangBtn').textContent = lang === 'en' ? 'عر' : 'EN';
  applyLang();
  sCheckAuth();
  loadSession();
  loadSimulator();
});
</script>
</body>
</html>
