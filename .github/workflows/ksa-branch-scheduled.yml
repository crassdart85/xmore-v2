name: KSA Branch Automation

# GitHub scheduled workflows only run from the default branch.
# This workflow lives on main, but every job checks out xmore-ksa so
# KSA automation runs against the KSA codebase on its own schedule.

on:
  schedule:
    - cron: '0 7,8,9,10,11,12 * * 0,1,2,3,4'
    - cron: '0 7,9,11 * * 0,1,2,3,4'
    - cron: '15 12 * * 0,1,2,3,4'
    - cron: '30 21 * * 0,1,2,3,4'
    - cron: '0 0 * * 6'
    - cron: '0 6,12,18 * * *'

  workflow_dispatch:
    inputs:
      job:
        description: 'Optional job selector'
        required: false
        default: ''

concurrency:
  group: ksa-branch-pipeline-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
  TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
  MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
  KSA_WHAPI_TOKEN: ${{ secrets.KSA_WHAPI_TOKEN }}
  KSA_WHATSAPP_CHANNEL_ID: ${{ secrets.KSA_WHATSAPP_CHANNEL_ID }}
  FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

jobs:
  ksa-intraday-prices:
    if: github.event.schedule == '0 7,8,9,10,11,12 * * 0,1,2,3,4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: xmore-ksa
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Saudi holiday check
        continue-on-error: true
        run: |
          python - <<'EOF'
          import datetime, sys
          holidays = {
              datetime.date(2026, 2, 22),
              datetime.date(2026, 3, 30), datetime.date(2026, 3, 31),
              datetime.date(2026, 4, 1), datetime.date(2026, 4, 2), datetime.date(2026, 4, 3),
              datetime.date(2026, 6, 6), datetime.date(2026, 6, 7),
              datetime.date(2026, 6, 8), datetime.date(2026, 6, 9), datetime.date(2026, 6, 10),
              datetime.date(2026, 9, 23),
          }
          today = datetime.date.today()
          if today in holidays:
              print(f"HOLIDAY {today} - skipping price collection")
              sys.exit(0)
          print(f"Trading day {today} - collecting KSA prices")
          EOF

      - name: Collect KSA intraday prices
        run: python collect_data.py --prices-only

  ksa-intraday-news:
    if: github.event.schedule == '0 7,9,11 * * 0,1,2,3,4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: xmore-ksa
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-finbert-${{ runner.os }}
          restore-keys: hf-finbert-${{ runner.os }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: KSA intelligence pipeline
        continue-on-error: true
        run: |
          python - <<'EOF'
          from agents.intelligence.ksa_intelligence.ksa_run_intelligence import run_ksa_intelligence
          run_ksa_intelligence(None)
          EOF

      - name: KSA Telegram ingestion
        continue-on-error: true
        run: python engines/telegram_reader_ksa.py

      - name: News RAG ingestion
        continue-on-error: true
        run: python news/ingest_cli.py

  ksa-post-market-pipeline:
    if: github.event.schedule == '15 12 * * 0,1,2,3,4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: xmore-ksa
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-finbert-${{ runner.os }}
          restore-keys: hf-finbert-${{ runner.os }}

      - uses: actions/cache@v4
        with:
          path: models/
          key: lgbm-models-ksa-${{ runner.os }}-${{ hashFiles('agents/agent_ml.py') }}
          restore-keys: lgbm-models-ksa-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Saudi holiday check
        id: holiday
        run: |
          python - <<'EOF'
          import datetime, os
          holidays = {
              datetime.date(2026, 2, 22),
              datetime.date(2026, 3, 30), datetime.date(2026, 3, 31),
              datetime.date(2026, 4, 1), datetime.date(2026, 4, 2), datetime.date(2026, 4, 3),
              datetime.date(2026, 6, 6), datetime.date(2026, 6, 7),
              datetime.date(2026, 6, 8), datetime.date(2026, 6, 9), datetime.date(2026, 6, 10),
              datetime.date(2026, 9, 23),
          }
          today = datetime.date.today()
          is_holiday = today in holidays
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"is_holiday={'true' if is_holiday else 'false'}\n")
          print(f"{'HOLIDAY' if is_holiday else 'TRADING'}: {today}")
          EOF

      - name: Collect KSA close prices
        run: python collect_data.py --prices-only

      - name: Collect KSA post-market news
        continue-on-error: true
        run: python collect_data.py --news-only

      - name: Analyze KSA sentiment
        continue-on-error: true
        run: python sentiment_gemini.py

      - name: Run KSA signal agents
        if: steps.holiday.outputs.is_holiday != 'true'
        env:
          OPTUNA_N_TRIALS: '8'
        run: python run_agents_ksa.py

      - name: Evaluate KSA prediction accuracy
        run: python evaluate.py

  ksa-nightly-pipeline:
    needs: [ksa-post-market-pipeline]
    if: always() && (github.event.schedule == '30 21 * * 0,1,2,3,4' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: xmore-ksa
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Evaluate KSA performance metrics
        continue-on-error: true
        run: python -c "from engines.evaluate_performance import run_evaluation; run_evaluation(market_id='KSA')"

      - name: Generate KSA portfolios
        continue-on-error: true
        run: python engines/generate_portfolios.py

  ksa-weekly-dcf:
    if: github.event.schedule == '0 0 * * 6' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: xmore-ksa
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run KSA DCF engine
        run: python -m agents.dcf.ksa_dcf_engine --force

      - name: Publish DCF summary to WhatsApp
        continue-on-error: true
        run: |
          python - <<'EOF'
          from engines.whatsapp_publisher_ksa import publish_ksa_daily
          publish_ksa_daily([])
          EOF

  ksa-catchup-evaluation:
    if: github.event.schedule == '0 6,12,18 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: xmore-ksa
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Evaluate KSA predictions
        run: python evaluate.py

      - name: Evaluate KSA performance metrics
        continue-on-error: true
        run: python -c "from engines.evaluate_performance import run_evaluation; run_evaluation(market_id='KSA')"
