name: KSA Daily Pipeline

# Tadawul (Saudi Exchange): 10:00–15:00 AST (UTC+3, no DST) = 07:00–12:00 UTC
# Trading days: Sun–Thu (GitHub cron: 0=Sun, 1=Mon, ..., 4=Thu)
# ─────────────────────────────────────────────────────────────────────────────
# Schedule (UTC):
#  07–12  Sun–Thu    ksa-intraday-prices      (hourly during Tadawul session)
#  07,09,11 Sun–Thu  ksa-intraday-news        (news 3× per trading day)
#  12:15  Sun–Thu    ksa-post-market-pipeline  (15 min after close → signals)
#  21:30  Sun–Thu    ksa-nightly-pipeline      (full nightly evaluate)
#  00:00  Sat        ksa-weekly-dcf            (weekly DCF recompute)
#  06,12,18 Daily    ksa-catchup-evaluation    (resolve expired predictions)

on:
  schedule:
    - cron: '0 7,8,9,10,11,12 * * 0,1,2,3,4'   # intraday prices (Sun–Thu)
    - cron: '0 7,9,11 * * 0,1,2,3,4'            # intraday news  (Sun–Thu)
    - cron: '15 12 * * 0,1,2,3,4'               # post-market pipeline
    - cron: '30 21 * * 0,1,2,3,4'               # nightly pipeline
    - cron: '0 0 * * 6'                          # weekly DCF (Saturday)
    - cron: '0 6,12,18 * * *'                    # catchup evaluation

  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run (leave blank = all via dispatch)'
        required: false
        default: ''

concurrency:
  group: ksa-pipeline-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

env:
  DATABASE_URL:            ${{ secrets.DATABASE_URL }}
  GOOGLE_API_KEY:          ${{ secrets.GOOGLE_API_KEY }}
  TELEGRAM_API_ID:         ${{ secrets.TELEGRAM_API_ID }}
  TELEGRAM_API_HASH:       ${{ secrets.TELEGRAM_API_HASH }}
  MARKETAUX_API_KEY:       ${{ secrets.MARKETAUX_API_KEY }}
  KSA_WHAPI_TOKEN:         ${{ secrets.KSA_WHAPI_TOKEN }}
  KSA_WHATSAPP_CHANNEL_ID: ${{ secrets.KSA_WHATSAPP_CHANNEL_ID }}
  FINNHUB_API_KEY:         ${{ secrets.FINNHUB_API_KEY }}
  NEWS_API_KEY:            ${{ secrets.NEWS_API_KEY }}

# ─────────────────────────────────────────────────────────────────────────────
# Shared setup steps (referenced via YAML anchors)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Job 1: KSA intraday price collection ──────────────────────────────────
  ksa-intraday-prices:
    if: github.event.schedule == '0 7,8,9,10,11,12 * * 0,1,2,3,4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with: { ref: ${{ github.ref_name }}, fetch-depth: 1 }

      - uses: actions/setup-python@v4
        with: { python-version: '3.11', cache: 'pip', cache-dependency-path: requirements.txt }

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - run: pip install -r requirements.txt

      - name: Saudi holiday check
        continue-on-error: true
        run: |
          python - <<'EOF'
          import datetime, sys
          HOLIDAYS = {
              datetime.date(2026, 2, 22),  # Founding Day
              datetime.date(2026, 3, 30), datetime.date(2026, 3, 31),
              datetime.date(2026, 4,  1), datetime.date(2026, 4,  2),
              datetime.date(2026, 4,  3),  # Eid al-Fitr
              datetime.date(2026, 6,  6), datetime.date(2026, 6,  7),
              datetime.date(2026, 6,  8), datetime.date(2026, 6,  9),
              datetime.date(2026, 6, 10),  # Eid al-Adha
              datetime.date(2026, 9, 23),  # National Day
          }
          today = datetime.date.today()
          if today in HOLIDAYS:
              print(f"HOLIDAY {today} — skipping price collection")
              sys.exit(0)
          print(f"Trading day {today} — collecting KSA prices")
          EOF

      - name: Collect KSA intraday prices
        run: python collect_data.py --prices-only --market KSA

      - name: Summary
        if: always()
        run: |
          echo "=== KSA Intraday Prices ==="
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "AST: $(TZ='Asia/Riyadh' date '+%Y-%m-%d %H:%M:%S')"


  # ── Job 2: KSA intraday news ───────────────────────────────────────────────
  ksa-intraday-news:
    if: github.event.schedule == '0 7,9,11 * * 0,1,2,3,4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with: { ref: ${{ github.ref_name }}, fetch-depth: 1 }

      - uses: actions/setup-python@v4
        with: { python-version: '3.11', cache: 'pip', cache-dependency-path: requirements.txt }

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-finbert-${{ runner.os }}
          restore-keys: hf-finbert-${{ runner.os }}

      - run: pip install -r requirements.txt

      - name: KSA intelligence pipeline (news-only)
        continue-on-error: true
        run: |
          python - <<'EOF'
          from agents.intelligence.ksa_intelligence.ksa_run_intelligence import run_ksa_intelligence
          run_ksa_intelligence(None)
          EOF

      - name: KSA Telegram ingestion
        continue-on-error: true
        run: python engines/telegram_reader_ksa.py

      - name: News RAG ingestion
        continue-on-error: true
        run: python news/ingest_cli.py --market KSA

      - name: Summary
        if: always()
        run: |
          echo "=== KSA Intraday News ==="
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"


  # ── Job 3: KSA post-market pipeline ───────────────────────────────────────
  ksa-post-market-pipeline:
    if: github.event.schedule == '15 12 * * 0,1,2,3,4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with: { ref: ${{ github.ref_name }}, fetch-depth: 1 }

      - uses: actions/setup-python@v4
        with: { python-version: '3.11', cache: 'pip', cache-dependency-path: requirements.txt }

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-finbert-${{ runner.os }}
          restore-keys: hf-finbert-${{ runner.os }}

      - uses: actions/cache@v4
        with:
          path: models/
          key: lgbm-models-${{ runner.os }}-${{ hashFiles('agents/agent_ml.py') }}
          restore-keys: lgbm-models-${{ runner.os }}-

      - run: pip install -r requirements.txt

      - name: Saudi holiday check
        id: holiday
        run: |
          python - <<'EOF'
          import datetime, os
          HOLIDAYS = {
              datetime.date(2026, 2, 22),
              datetime.date(2026, 3, 30), datetime.date(2026, 3, 31),
              datetime.date(2026, 4,  1), datetime.date(2026, 4,  2), datetime.date(2026, 4,  3),
              datetime.date(2026, 6,  6), datetime.date(2026, 6,  7),
              datetime.date(2026, 6,  8), datetime.date(2026, 6,  9), datetime.date(2026, 6, 10),
              datetime.date(2026, 9, 23),
          }
          today = datetime.date.today()
          is_holiday = today in HOLIDAYS
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"is_holiday={'true' if is_holiday else 'false'}\n")
          print(f"{'HOLIDAY' if is_holiday else 'TRADING'}: {today}")
          EOF

      - name: Collect KSA close prices
        run: python collect_data.py --prices-only --market KSA

      - name: Collect KSA post-market news
        continue-on-error: true
        run: python collect_data.py --news-only --market KSA

      - name: Analyze KSA sentiment (Gemini)
        continue-on-error: true
        run: python sentiment_gemini.py --market KSA

      - name: Run KSA signal agents
        if: steps.holiday.outputs.is_holiday != 'true'
        env:
          OPTUNA_N_TRIALS: '8'
        run: python run_agents_ksa.py

      - name: Evaluate KSA prediction accuracy
        run: python evaluate.py --market KSA

      - name: Summary
        if: always()
        run: |
          echo "=== KSA Post-Market Pipeline ==="
          echo "Holiday: ${{ steps.holiday.outputs.is_holiday }}"
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "AST: $(TZ='Asia/Riyadh' date '+%Y-%m-%d %H:%M:%S')"


  # ── Job 4: KSA nightly pipeline ───────────────────────────────────────────
  ksa-nightly-pipeline:
    needs: [ksa-post-market-pipeline]
    if: always() && (github.event.schedule == '30 21 * * 0,1,2,3,4' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with: { ref: ${{ github.ref_name }}, fetch-depth: 1 }

      - uses: actions/setup-python@v4
        with: { python-version: '3.11', cache: 'pip', cache-dependency-path: requirements.txt }

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - run: pip install -r requirements.txt

      - name: Evaluate KSA performance metrics
        continue-on-error: true
        run: |
          python -c "
          from engines.evaluate_performance import run_evaluation
          run_evaluation(market_id='KSA')
          "

      - name: Generate KSA portfolios
        continue-on-error: true
        run: python engines/generate_portfolios.py --market KSA

      - name: Summary
        if: always()
        run: |
          echo "=== KSA Nightly Pipeline ==="
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"


  # ── Job 5: Weekly KSA DCF recompute ───────────────────────────────────────
  ksa-weekly-dcf:
    if: github.event.schedule == '0 0 * * 6' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with: { ref: ${{ github.ref_name }}, fetch-depth: 1 }

      - uses: actions/setup-python@v4
        with: { python-version: '3.11', cache: 'pip', cache-dependency-path: requirements.txt }

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - run: pip install -r requirements.txt

      - name: Run KSA DCF engine — all stocks (bull/base/bear)
        run: python agents/dcf/ksa_dcf_engine.py --force

      - name: Publish DCF deep-value summary to WhatsApp
        continue-on-error: true
        run: |
          python - <<'EOF'
          from engines.whatsapp_publisher_ksa import publish_ksa_daily
          publish_ksa_daily([])  # DCF summary mode
          EOF

      - name: Summary
        if: always()
        run: |
          echo "=== KSA Weekly DCF ==="
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"


  # ── Job 6: Catchup evaluation (3× daily) ──────────────────────────────────
  ksa-catchup-evaluation:
    if: github.event.schedule == '0 6,12,18 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with: { ref: ${{ github.ref_name }}, fetch-depth: 1 }

      - uses: actions/setup-python@v4
        with: { python-version: '3.11', cache: 'pip', cache-dependency-path: requirements.txt }

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ksa-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ksa-${{ runner.os }}-

      - run: pip install -r requirements.txt

      - name: Evaluate KSA predictions (catchup)
        run: python evaluate.py --market KSA

      - name: Evaluate KSA performance metrics
        continue-on-error: true
        run: |
          python -c "
          from engines.evaluate_performance import run_evaluation
          run_evaluation(market_id='KSA')
          "

      - name: Summary
        if: always()
        run: |
          echo "=== KSA Catchup Evaluation ==="
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
