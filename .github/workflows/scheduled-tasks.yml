name: Trading System Automation

# EGX market hours: 09:00–14:00 Cairo (UTC+2) = 07:00–12:00 UTC, Sun–Thu
# NYSE/NASDAQ market hours: Mon–Fri
# ─────────────────────────────────────────────────────────────────────────
# Schedule overview (all times UTC):
#
#  07,08,09,10,11,12  Sun–Thu  intraday-price-update         (hourly prices, 09:00–14:00 Cairo)
#  07,09,11           Sun–Thu  intraday-news-update           (news+RSS 3× during trading day)
#  12:30              Sun–Thu  post-market-pipeline           (close prices→sentiment→agents→eval)
#  14:00              Sun–Thu  egx-daily-snapshot             (backup EGX data export, 16:00 Cairo)
#  22:00              Sun–Fri  daily-pipeline                 (full nightly: briefing, portfolios)
#  06,12,18           Daily    catchup-evaluation             (resolve expired predictions)
#  12:35–13:20        Sun–Thu  etf-egx-tape/nav/holdings/fv/pd (EGX ETF post-close scrape)
#  21:30 + 04:30      Mon–Fri  etf-global-prices (×2)         (NYSE/NASDAQ EOD prices)
#  Sun 05:00–06:00    Weekly   etf-global-universe/holdings/docs
#  :15                Hourly   etf-rag-embedding

on:
  schedule:
    # Hourly price collection during EGX trading hours (09:00–14:00 Cairo = 07:00–12:00 UTC)
    - cron: '0 7,8,9,10,11,12 * * 0-4'

    # News + RSS collection 3× during trading day (09:00, 11:00, 13:00 Cairo = 07:00, 09:00, 11:00 UTC)
    - cron: '0 7,9,11 * * 0-4'

    # Post-market pipeline: 30 min after close (14:30 Cairo = 12:30 UTC)
    # prices → news → reliable-news → sentiment → agents → evaluate
    - cron: '30 12 * * 0-4'

    # EGX daily snapshot backup (16:00 Cairo = 14:00 UTC)
    - cron: '0 14 * * 0-4'

    # Full nightly pipeline (00:00 Cairo+1 = 22:00 UTC) — includes briefing + portfolios
    - cron: '0 22 * * 0-5'

    # Catchup evaluation: 3× daily
    - cron: '0 6,12,18 * * *'

    # ── ETF jobs (EGX post-close, Africa/Cairo UTC+2) ──
    # EGX ETF tape (14:35 Cairo = 12:35 UTC, Sun–Thu)
    - cron: '35 12 * * 0-4'
    # EGX ETF NAV (14:45 Cairo = 12:45 UTC, Sun–Thu)
    - cron: '45 12 * * 0-4'
    # EGX ETF holdings (15:00 Cairo = 13:00 UTC, Sun–Thu)
    - cron: '0 13 * * 0-4'
    # EGX ETF fund volume (15:10 Cairo = 13:10 UTC, Sun–Thu)
    - cron: '10 13 * * 0-4'
    # ETF premium/discount compute (15:20 Cairo = 13:20 UTC, Sun–Thu)
    - cron: '20 13 * * 0-4'
    # Global ETF prices night run (23:30 Cairo = 21:30 UTC, Mon–Fri — NYSE/NASDAQ)
    - cron: '30 21 * * 1-5'
    # Global ETF prices morning backstop (06:30 Cairo = 04:30 UTC, Mon–Fri — NYSE/NASDAQ)
    - cron: '30 4 * * 1-5'
    # Global ETF universe refresh (07:00 Cairo Sun = 05:00 UTC)
    - cron: '0 5 * * 0'
    # Global ETF holdings refresh (07:30 Cairo Sun = 05:30 UTC)
    - cron: '30 5 * * 0'
    # ETF docs ingest (08:00 Cairo Sun = 06:00 UTC)
    - cron: '0 6 * * 0'
    # ETF RAG embedding worker (hourly)
    - cron: '15 * * * *'

  workflow_dispatch:

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Intraday price update (hourly during EGX trading, 09:00–14:00 Cairo)
  # Lightweight — prices only, no news, no agents
  # ──────────────────────────────────────────────
  intraday-price-update:
    if: github.event.schedule == '0 7,8,9,10,11,12 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"

      - name: Collect intraday prices
        run: python collect_data.py --prices-only

  # ──────────────────────────────────────────────
  # Job 2: Intraday news update (3× during trading: 09:00, 11:00, 13:00 Cairo)
  # News + RSS only — respects NewsAPI 100 req/day free tier
  # ──────────────────────────────────────────────
  intraday-news-update:
    if: github.event.schedule == '0 7,9,11 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"

      - name: Collect news and RSS feeds
        run: python collect_data.py --news-only

      - name: Collect reliable institutional news (RSS + PDF)
        continue-on-error: true
        run: python xmore_news_reliable/main.py --run-all

      - name: News RAG ingestion (embed + classify + drift adjustment)
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python news/ingest_cli.py

  # ──────────────────────────────────────────────
  # Job 3: Post-market pipeline (30 min after EGX close — 14:30 Cairo = 12:30 UTC)
  # Runs same-day predictions so the dashboard shows fresh signals by afternoon
  # ──────────────────────────────────────────────
  post-market-pipeline:
    if: github.event.schedule == '30 12 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: main-pipeline
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"

      # Collect final close prices
      - name: Collect close prices
        run: python collect_data.py --prices-only

      # Collect any last-minute news
      - name: Collect news
        continue-on-error: true
        run: python collect_data.py --news-only

      # Institutional news (CBE, EGX, IMF, FRA) via RSS and PDF monitor
      - name: Collect reliable institutional news
        continue-on-error: true
        run: python xmore_news_reliable/main.py --run-all

      # Sentiment scoring via Gemini
      - name: Analyze sentiment
        continue-on-error: true
        run: python sentiment_gemini.py

      # Run 5-agent prediction pipeline (RSI + MA + Volume + ML + Gemini LLM)
      - name: Run agent pipeline
        run: python run_agents.py

      # Evaluate any predictions whose target_date has now passed
      - name: Evaluate prediction accuracy
        run: python evaluate.py

  # ──────────────────────────────────────────────
  # Job 4: EGX daily snapshot (backup export, 16:00 Cairo = 14:00 UTC, Sun–Thu)
  # ──────────────────────────────────────────────
  egx-daily-snapshot:
    if: github.event.schedule == '0 14 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements_data.txt

      - name: Run EGX daily snapshot job
        run: python xmore_data/daily_snapshot_job.py --interval 1d --output-dir data_exports/daily_egx_snapshots

      - name: Upload snapshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: egx-daily-snapshots-${{ github.run_id }}
          path: data_exports/daily_egx_snapshots/
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Job 5: Full nightly pipeline (00:00 Cairo+1 = 22:00 UTC, Sun–Fri)
  # Includes briefing generation, model portfolios, and full sentiment refresh.
  # Depends on post-market-pipeline having already run today's agents.
  # ──────────────────────────────────────────────
  daily-pipeline:
    needs: [post-market-pipeline]
    # Run even if post-market-pipeline was skipped (different schedule) or failed
    if: always() && (github.event.schedule == '0 22 * * 0-5' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: main-pipeline
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"

      # Step 1: Full price + news collection
      - name: Collect prices and news
        run: python collect_data.py

      # Step 2: Custom news sources (URLs, RSS, Telegram channels)
      - name: Fetch custom news sources
        continue-on-error: true
        run: python engines/custom_source_fetcher.py --fetch-all

      # Step 3: Reliable institutional news (CBE, EGX, IMF, FRA, MoF)
      - name: Collect reliable institutional news
        continue-on-error: true
        run: python xmore_news_reliable/main.py --run-all

      # Step 4: Full sentiment analysis with Gemini
      - name: Analyze sentiment
        continue-on-error: true
        run: python sentiment_gemini.py

      # Step 5: Run 5-agent pipeline (RSI + MA + Volume + ML + Gemini LLM)
      # Also generates trade recommendations and daily briefing
      - name: Run agent pipeline
        run: python run_agents.py

      # Step 6: Generate model portfolios
      - name: Generate portfolios
        continue-on-error: true
        run: python engines/generate_portfolios.py

      # Step 7: Evaluate agent prediction accuracy
      - name: Evaluate prediction accuracy
        run: python evaluate.py

  # ──────────────────────────────────────────────
  # Job 6: Catchup evaluation (3× daily — 06:00, 12:00, 18:00 UTC)
  # Resolves predictions whose target_date has passed between pipeline runs
  # ──────────────────────────────────────────────
  catchup-evaluation:
    if: github.event.schedule == '0 6,12,18 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"

      # Agent prediction accuracy (evaluations table)
      - name: Evaluate prediction accuracy
        run: python evaluate.py

      # Trade performance metrics (returns, alpha, sharpe)
      - name: Evaluate trade performance
        run: python -c "from engines.evaluate_performance import run_evaluation; run_evaluation()"

  # ══════════════════════════════════════════════════
  # ETF JOBS (EGX local + global Egypt-exposure ETFs)
  # ══════════════════════════════════════════════════

  # ─────────────────────────────────────
  # ETF Job 1: EGX trading tape (14:35 Cairo = 12:35 UTC, Sun–Thu)
  # ─────────────────────────────────────
  etf-egx-tape:
    if: github.event.schedule == '35 12 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"
      - name: Scrape EGX ETF daily tape
        run: python -m engines.etf_egx_tape

  # ─────────────────────────────────────
  # ETF Job 2: EGX NAV (14:45 Cairo = 12:45 UTC, Sun–Thu)
  # ─────────────────────────────────────
  etf-egx-nav:
    if: github.event.schedule == '45 12 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"
      - name: Scrape EGX ETF NAV
        run: python -m engines.etf_egx_nav

  # ─────────────────────────────────────
  # ETF Job 3: EGX holdings (15:00 Cairo = 13:00 UTC, Sun–Thu)
  # ─────────────────────────────────────
  etf-egx-holdings:
    if: github.event.schedule == '0 13 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"
      - name: Scrape EGX ETF holdings
        run: python -m engines.etf_egx_holdings

  # ─────────────────────────────────────
  # ETF Job 4: EGX fund volume (15:10 Cairo = 13:10 UTC, Sun–Thu)
  # ─────────────────────────────────────
  etf-egx-fund-volume:
    if: github.event.schedule == '10 13 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"
      - name: Scrape EGX ETF fund volume
        run: python -m engines.etf_egx_fund_volume

  # ─────────────────────────────────────
  # ETF Job 5: Premium/discount compute (15:20 Cairo = 13:20 UTC, Sun–Thu)
  # ─────────────────────────────────────
  etf-premium-discount:
    if: github.event.schedule == '20 13 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"
      - name: Compute ETF premium/discount
        run: python -m engines.etf_premium_discount

  # ─────────────────────────────────────
  # ETF Job 6: Global prices night run (23:30 Cairo = 21:30 UTC)
  # ─────────────────────────────────────
  etf-global-prices:
    if: github.event.schedule == '30 21 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"
      - name: Fetch global ETF prices (EOD)
        run: python -m engines.etf_global_prices

  # ─────────────────────────────────────
  # ETF Job 7: Global prices backstop (06:30 Cairo = 04:30 UTC)
  # ─────────────────────────────────────
  etf-global-prices-backstop:
    if: github.event.schedule == '30 4 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"
      - name: Fetch global ETF prices (backstop/backfill)
        run: python -m engines.etf_global_prices --backfill

  # ─────────────────────────────────────
  # ETF Job 8: Global universe refresh (weekly, Sunday 05:00 UTC)
  # ─────────────────────────────────────
  etf-global-universe:
    if: github.event.schedule == '0 5 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"
      - name: Refresh global ETF universe from ETFDB
        run: python -m engines.etf_global_universe

  # ─────────────────────────────────────
  # ETF Job 9: Global holdings refresh (weekly, Sunday 05:30 UTC)
  # ─────────────────────────────────────
  etf-global-holdings:
    if: github.event.schedule == '30 5 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"
      - name: Refresh global ETF holdings from Yahoo Finance
        continue-on-error: true
        run: python -m engines.etf_global_holdings

  # ─────────────────────────────────────
  # ETF Job 10: ETF docs ingest (weekly, Sunday 06:00 UTC)
  # ─────────────────────────────────────
  etf-docs-ingest:
    if: github.event.schedule == '0 6 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"
      - name: Download and ingest ETF PDFs
        continue-on-error: true
        run: python -m engines.etf_docs_ingest

  # ─────────────────────────────────────
  # ETF Job 11: RAG embedding worker (hourly)
  # ─────────────────────────────────────
  etf-rag-embedding:
    if: github.event.schedule == '15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        run: python -c "from database import create_tables; create_tables()"
      - name: Process pending ETF document embeddings
        run: python -m engines.etf_rag_embedding_worker
