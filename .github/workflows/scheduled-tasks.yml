name: Trading System Automation

# Tadawul market hours: 10:00–15:00 Riyadh (UTC+3) = 07:00–12:00 UTC, Sun–Thu
# NYSE/NASDAQ market hours: Mon–Fri
# ─────────────────────────────────────────────────────────────────────────
# Schedule overview (all times UTC):
#
#  07,08,09,10,11,12  Sun–Thu  intraday-price-update         (hourly prices, 10:00–15:00 Riyadh)
#  07,09,11           Sun–Thu  intraday-news-update           (news+RSS 3× during trading day)
#  12:30              Sun–Thu  post-market-pipeline           (close prices→sentiment→agents→eval)
#  14:00              Sun–Thu  egx-daily-snapshot             (backup Tadawul data export, 18:00 Riyadh)
#  22:00              Sun–Fri  daily-pipeline                 (full nightly: briefing, portfolios)
#  06,12:15,18:00     3×/day   catchup-evaluation             (resolve expired predictions → track-record data)
#  13:30              Sun–Thu  etf-egx-all (Tadawul ETF post-close: tape+nav+holdings+fv+pd)
#  21:30 + 04:30      Mon–Fri  etf-global-prices (×2)         (NYSE/NASDAQ EOD prices)
#  Sun 05:00–06:00    Weekly   etf-global-universe/holdings/docs
#  :15                Hourly   etf-rag-embedding

on:
  schedule:
    # Hourly price collection during Tadawul trading hours (10:00–15:00 Riyadh = 07:00–12:00 UTC)
    - cron: '0 7,8,9,10,11,12 * * 0-4'

    # News + RSS collection 3× during trading day (10:00, 12:00, 14:00 Riyadh = 07:00, 09:00, 11:00 UTC)
    - cron: '0 7,9,11 * * 0-4'

    # Post-market pipeline: 30 min after close (15:30 Riyadh = 12:30 UTC)
    # prices → news → reliable-news → sentiment → agents → evaluate
    - cron: '30 12 * * 0-4'

    # Tadawul daily snapshot backup (18:00 Riyadh = 14:00 UTC)
    - cron: '0 14 * * 0-4'

    # Full nightly pipeline (01:00 Riyadh+1 = 22:00 UTC) — includes briefing + portfolios
    - cron: '0 22 * * 0-5'

    # Catchup evaluation: 3× daily (fills actual_next_day_return for track-record page)
    # 12:15 staggers past intraday-price-update (12:00) to avoid reading incomplete prices
    - cron: '0 6,18 * * *'
    - cron: '15 12 * * *'

    # ── ETF jobs (Tadawul post-close, Asia/Riyadh UTC+3) ──
    # All Tadawul ETF scrapes combined in one trigger (16:30 Riyadh = 13:30 UTC, Sun–Thu)
    # tape → NAV → holdings → fund volume → premium/discount run sequentially
    - cron: '30 13 * * 0-4'
    # Global ETF prices night run (00:30 Riyadh = 21:30 UTC, Mon–Fri — NYSE/NASDAQ)
    - cron: '30 21 * * 1-5'
    # Global ETF prices morning backstop (09:30 Riyadh = 04:30 UTC, Mon–Fri — NYSE/NASDAQ)
    - cron: '30 4 * * 1-5'
    # Global ETF universe refresh (10:00 Riyadh Sun = 05:00 UTC)
    - cron: '0 5 * * 0'
    # Global ETF holdings refresh (10:30 Riyadh Sun = 05:30 UTC)
    - cron: '30 5 * * 0'
    # ETF docs ingest (11:00 Riyadh Sun = 06:00 UTC)
    - cron: '0 6 * * 0'
    # ETF RAG embedding worker (4× daily — only processes PENDING chunks)
    - cron: '15 6,10,14,20 * * *'
    # Weekly backtest (Sunday 07:00 UTC)
    - cron: '0 7 * * 0'

  workflow_dispatch:

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
  TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
  MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Intraday price update (hourly during Tadawul trading, 10:00–15:00 Riyadh)
  # Lightweight — prices only, no news, no agents
  # ──────────────────────────────────────────────
  intraday-price-update:
    if: github.event.schedule == '0 7,8,9,10,11,12 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect intraday prices
        run: python collect_data.py --prices-only

  # ──────────────────────────────────────────────
  # Job 2: Intraday news update (3× during trading: 10:00, 12:00, 14:00 Riyadh)
  # News + RSS only — respects NewsAPI 100 req/day free tier
  # ──────────────────────────────────────────────
  intraday-news-update:
    if: github.event.schedule == '0 7,9,11 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # Cache HuggingFace FinBERT model — avoids re-downloading ~500MB on every run
      - name: Restore HuggingFace model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-finbert-${{ runner.os }}
          restore-keys: |
            hf-finbert-${{ runner.os }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schema
        timeout-minutes: 2
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"

      - name: Collect news and RSS feeds
        run: python collect_data.py --news-only

      - name: Write Gmail credentials
        continue-on-error: true
        env:
          GMAIL_CREDENTIALS_B64: ${{ secrets.GMAIL_CREDENTIALS_B64 }}
          GMAIL_TOKEN_B64: ${{ secrets.GMAIL_TOKEN_B64 }}
        run: |
          [ -n "$GMAIL_CREDENTIALS_B64" ] && echo "$GMAIL_CREDENTIALS_B64" | base64 -d > xmore_news_reliable/credentials.json
          [ -n "$GMAIL_TOKEN_B64" ] && echo "$GMAIL_TOKEN_B64" | base64 -d > xmore_news_reliable/token.json

      - name: Collect reliable institutional news (RSS + PDF)
        continue-on-error: true
        run: python xmore_news_reliable/main.py --run-all

      - name: News RAG ingestion (embed + classify + drift adjustment)
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python news/ingest_cli.py

  # ──────────────────────────────────────────────
  # Job 3: Post-market pipeline (30 min after Tadawul close — 15:30 Riyadh = 12:30 UTC)
  # Runs same-day predictions so the dashboard shows fresh signals by afternoon
  # ──────────────────────────────────────────────
  post-market-pipeline:
    if: github.event.schedule == '30 12 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # Cache per-symbol LightGBM models (Optuna best_params inside) across runs
      - name: Restore ML model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: lgbm-models-${{ runner.os }}-${{ hashFiles('agents/agent_ml.py') }}
          restore-keys: |
            lgbm-models-${{ runner.os }}-

      # Cache HuggingFace FinBERT model — avoids re-downloading ~500MB on every run
      - name: Restore HuggingFace model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-finbert-${{ runner.os }}
          restore-keys: |
            hf-finbert-${{ runner.os }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schema
        timeout-minutes: 2
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"

      # Collect final close prices
      - name: Collect close prices
        run: python collect_data.py --prices-only

      # Collect any last-minute news
      - name: Collect news
        continue-on-error: true
        run: python collect_data.py --news-only

      # Institutional news (CBE, EGX, IMF, FRA) via RSS and PDF monitor
      - name: Write Gmail credentials
        continue-on-error: true
        env:
          GMAIL_CREDENTIALS_B64: ${{ secrets.GMAIL_CREDENTIALS_B64 }}
          GMAIL_TOKEN_B64: ${{ secrets.GMAIL_TOKEN_B64 }}
        run: |
          [ -n "$GMAIL_CREDENTIALS_B64" ] && echo "$GMAIL_CREDENTIALS_B64" | base64 -d > xmore_news_reliable/credentials.json
          [ -n "$GMAIL_TOKEN_B64" ] && echo "$GMAIL_TOKEN_B64" | base64 -d > xmore_news_reliable/token.json

      - name: Collect reliable institutional news
        continue-on-error: true
        run: python xmore_news_reliable/main.py --run-all

      # Sentiment scoring via Gemini
      - name: Analyze sentiment
        continue-on-error: true
        run: python sentiment_gemini.py

      # Run 5-agent prediction pipeline (RSI + MA + Volume + ML + Gemini LLM)
      - name: Run agent pipeline
        env:
          OPTUNA_N_TRIALS: '8'
        run: python run_agents.py

      # Evaluate any predictions whose target_date has now passed
      - name: Evaluate prediction accuracy
        run: python evaluate.py

  # ──────────────────────────────────────────────
  # Job 4: Tadawul daily snapshot (backup export, 18:00 Riyadh = 14:00 UTC, Sun–Thu)
  # ──────────────────────────────────────────────
  egx-daily-snapshot:
    if: github.event.schedule == '0 14 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements_data.txt

      - name: Run Tadawul daily snapshot job
        run: python xmore_data/daily_snapshot_job.py --interval 1d --output-dir data_exports/daily_egx_snapshots

      - name: Upload snapshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: egx-daily-snapshots-${{ github.run_id }}
          path: data_exports/daily_egx_snapshots/
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Job 5: Full nightly pipeline (01:00 Riyadh+1 = 22:00 UTC, Sun–Fri)
  # Includes briefing generation, model portfolios, and full sentiment refresh.
  # Depends on post-market-pipeline having already run today's agents.
  # ──────────────────────────────────────────────
  daily-pipeline:
    needs: [post-market-pipeline]
    # Run even if post-market-pipeline was skipped (different schedule) or failed
    if: always() && (github.event.schedule == '0 22 * * 0-5' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # Cache per-symbol LightGBM models (Optuna best_params inside) across runs
      # Prevents 25-trial HPO from re-running on every ephemeral GHA runner
      - name: Restore ML model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: lgbm-models-${{ runner.os }}-${{ hashFiles('agents/agent_ml.py') }}
          restore-keys: |
            lgbm-models-${{ runner.os }}-

      # Cache HuggingFace FinBERT model — avoids re-downloading ~500MB on every run
      - name: Restore HuggingFace model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-finbert-${{ runner.os }}
          restore-keys: |
            hf-finbert-${{ runner.os }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schema
        timeout-minutes: 2
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"

      # Step 1: Full price + news collection
      - name: Collect prices and news
        run: python collect_data.py

      # Step 2: Custom news sources (URLs, RSS, Telegram channels)
      - name: Fetch custom news sources
        continue-on-error: true
        run: python engines/custom_source_fetcher.py --fetch-all

      # Step 3: Reliable institutional news (CBE, EGX, IMF, FRA, MoF)
      - name: Write Gmail credentials
        continue-on-error: true
        env:
          GMAIL_CREDENTIALS_B64: ${{ secrets.GMAIL_CREDENTIALS_B64 }}
          GMAIL_TOKEN_B64: ${{ secrets.GMAIL_TOKEN_B64 }}
        run: |
          [ -n "$GMAIL_CREDENTIALS_B64" ] && echo "$GMAIL_CREDENTIALS_B64" | base64 -d > xmore_news_reliable/credentials.json
          [ -n "$GMAIL_TOKEN_B64" ] && echo "$GMAIL_TOKEN_B64" | base64 -d > xmore_news_reliable/token.json

      - name: Collect reliable institutional news
        continue-on-error: true
        run: python xmore_news_reliable/main.py --run-all

      # Step 4: Full sentiment analysis with Gemini
      - name: Analyze sentiment
        continue-on-error: true
        run: python sentiment_gemini.py

      # Step 4b: Refresh macro indicators (CBE rate, USD/EGP, CPI, GDP)
      - name: Refresh macro indicators
        continue-on-error: true
        run: |
          python -c "
          import asyncio
          from database import get_connection
          from engines.macro_data import MacroDataProvider
          with get_connection() as conn:
              provider = MacroDataProvider(conn)
              results = asyncio.run(provider.refresh_all())
              print(f'Macro refresh: {results}')
          "

      # Step 5: Run 5-agent pipeline (RSI + MA + Volume + ML + Gemini LLM)
      # Also generates trade recommendations and daily briefing
      # OPTUNA_N_TRIALS=8 (reduced from 25) — cached params used when model file exists
      - name: Run agent pipeline
        env:
          OPTUNA_N_TRIALS: '8'
        run: python run_agents.py

      # Step 6: Generate model portfolios
      - name: Generate portfolios
        continue-on-error: true
        run: python engines/generate_portfolios.py

      # Step 7: Evaluate agent prediction accuracy
      - name: Evaluate prediction accuracy
        run: python evaluate.py

  # ──────────────────────────────────────────────
  # Job 6: Catchup evaluation (3× daily — 06:00, 12:00, 18:00 UTC)
  # Resolves predictions whose target_date has passed between pipeline runs
  # ──────────────────────────────────────────────
  catchup-evaluation:
    if: github.event.schedule == '0 6,18 * * *' || github.event.schedule == '15 12 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schema
        timeout-minutes: 3
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"

      # One-time cleanup: remove 0%-change evaluations caused by stale yfinance prices
      - name: Clean stale evaluations (0% change artifact)
        continue-on-error: true
        run: python fix_stale_evaluations.py

      # Agent prediction accuracy (evaluations table)
      - name: Evaluate prediction accuracy
        run: python evaluate.py

      # Trade performance metrics (returns, alpha, sharpe)
      - name: Evaluate trade performance
        run: python -c "from engines.evaluate_performance import run_evaluation; run_evaluation()"

      # Trailing stop checks — updates open positions held ≥20 days
      - name: Run holding manager (trailing stops)
        continue-on-error: true
        run: python -c "from database import get_connection; from engines.holding_manager import HoldingManager; conn = get_connection(); HoldingManager(conn).run_daily_check(); conn.close()"

  # ══════════════════════════════════════════════════
  # ETF JOBS (EGX local + global Egypt-exposure ETFs)
  # ══════════════════════════════════════════════════

  # ─────────────────────────────────────
  # ETF Job 1: Tadawul trading tape (15:35 Riyadh = 12:35 UTC, Sun–Thu)
  # ─────────────────────────────────────
  # ─────────────────────────────────────
  # ETF Job 1: All Tadawul ETF scrapes (16:30 Riyadh = 13:30 UTC, Sun–Thu)
  # Consolidated: tape → NAV → holdings → fund volume → premium/discount
  # Previously 5 separate crons (12:35–13:20 UTC) that GitHub Actions dropped
  # due to scheduler saturation. One trigger is reliable.
  # ─────────────────────────────────────
  etf-egx-all:
    if: github.event.schedule == '30 13 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        timeout-minutes: 2
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"
      # Mubasher first — reliable server-side rendered page, fast
      - name: Scrape EGX funds from Mubasher (statistics page)
        continue-on-error: true
        run: python -m engines.etf_egx_mubasher
      # EGX.com.eg scrapers — may be slow/blocked; capped at 5 min each
      - name: Scrape Tadawul ETF daily tape
        continue-on-error: true
        run: timeout 300 python -m engines.etf_egx_tape || true
      - name: Scrape Tadawul ETF NAV
        continue-on-error: true
        run: timeout 300 python -m engines.etf_egx_nav || true
      - name: Scrape Tadawul ETF holdings
        continue-on-error: true
        run: timeout 300 python -m engines.etf_egx_holdings || true
      - name: Scrape Tadawul ETF fund volume
        continue-on-error: true
        run: timeout 300 python -m engines.etf_egx_fund_volume || true
      - name: Compute ETF premium/discount
        continue-on-error: true
        run: timeout 120 python -m engines.etf_premium_discount || true

  # ─────────────────────────────────────
  # ETF Job 2: Global prices night run (00:30 Riyadh = 21:30 UTC)
  # ─────────────────────────────────────
  etf-global-prices:
    if: github.event.schedule == '30 21 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        timeout-minutes: 2
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"
      - name: Fetch global ETF prices (EOD)
        run: python -m engines.etf_global_prices

  # ─────────────────────────────────────
  # ETF Job 7: Global prices backstop (09:30 Riyadh = 04:30 UTC)
  # ─────────────────────────────────────
  etf-global-prices-backstop:
    if: github.event.schedule == '30 4 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        timeout-minutes: 2
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"
      - name: Fetch global ETF prices (backstop/backfill)
        run: python -m engines.etf_global_prices --backfill

  # ─────────────────────────────────────
  # ETF Job 8: Global universe refresh (weekly, Sunday 05:00 UTC)
  # ─────────────────────────────────────
  etf-global-universe:
    if: github.event.schedule == '0 5 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        timeout-minutes: 2
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"
      - name: Refresh global ETF universe from ETFDB
        run: python -m engines.etf_global_universe

  # ─────────────────────────────────────
  # ETF Job 9: Global holdings refresh (weekly, Sunday 05:30 UTC)
  # ─────────────────────────────────────
  etf-global-holdings:
    if: github.event.schedule == '30 5 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        timeout-minutes: 2
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"
      - name: Refresh global ETF holdings from Yahoo Finance
        continue-on-error: true
        run: python -m engines.etf_global_holdings

  # ─────────────────────────────────────
  # ETF Job 10: ETF docs ingest (weekly, Sunday 06:00 UTC)
  # ─────────────────────────────────────
  etf-docs-ingest:
    if: github.event.schedule == '0 6 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        timeout-minutes: 2
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"
      - name: Download and ingest ETF PDFs
        continue-on-error: true
        run: python -m engines.etf_docs_ingest

  # ─────────────────────────────────────
  # ETF Job 11: RAG embedding worker (hourly)
  # ─────────────────────────────────────
  etf-rag-embedding:
    if: github.event.schedule == '15 6,10,14,20 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        timeout-minutes: 2
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"
      - name: Process pending ETF document embeddings
        run: python -m engines.etf_rag_embedding_worker

  # ─────────────────────────────────────
  # Backtest: Walk-forward ML accuracy (weekly, Sunday 07:00 UTC)
  # ─────────────────────────────────────
  weekly-backtest:
    if: github.event.schedule == '0 7 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize database schema
        timeout-minutes: 2
        continue-on-error: true
        run: python -c "from database import create_tables; create_tables()"
      - name: Run walk-forward backtest and save results
        run: python engines/backtest.py --all --save
